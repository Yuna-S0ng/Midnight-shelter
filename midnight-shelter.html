<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>밤샘 대피소 (Midnight Shelter) — 벼락치기 메이트</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
    
    /* 전역 스타일 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background: #080b14; 
      font-family: 'Noto Sans KR', sans-serif;
      color: #c8d0e8;
      min-height: 100vh;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0d1120; }
    ::-webkit-scrollbar-thumb { background: #2a2d4a; border-radius: 2px; }
    
    /* 애니메이션 Keyframes */
    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.6; }
    }
    @keyframes toast-in {
      0% { opacity: 0; transform: translateX(100%); }
      15% { opacity: 1; transform: translateX(0); }
      80% { opacity: 1; transform: translateX(0); }
      100% { opacity: 0; transform: translateX(100%); }
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes typing-dot {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
    @keyframes neon-flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.7; }
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes progress-pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    /* 타이핑 인디케이터 */
    .typing-indicator { display: inline-flex; gap: 3px; align-items: center; margin-left: 6px; }
    .typing-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #39ff6e;
      box-shadow: 0 0 6px #39ff6e;
      display: inline-block; animation: typing-dot 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    /* 토스트 컨테이너 */
    #toast-container {
      position: fixed; top: 24px; right: 24px; zIndex: 9999;
      display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast-item {
      background: linear-gradient(135deg, #1a1f3a, #0f1224);
      border: 1px solid #39ff6e66;
      border-radius: 10px;
      padding: 12px 18px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: #39ff6e;
      text-shadow: 0 0 8px #39ff6e;
      box-shadow: 0 0 20px #39ff6e33, inset 0 0 20px #39ff6e08;
      animation: toast-in 3.5s ease forwards;
      max-width: 300px;
      letter-spacing: 0.04em;
    }

    /* 레이아웃 배경 */
    .bg-gradient {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        radial-gradient(ellipse 60% 40% at 20% 10%, #bf5fff0a 0%, transparent 60%),
        radial-gradient(ellipse 50% 30% at 80% 80%, #39ff6e08 0%, transparent 60%),
        radial-gradient(ellipse 40% 50% at 50% 50%, #00e5ff05 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .bg-grid {
      position: fixed; top: 0; left: 0; right: 0; height: 100vh;
      background-image: 
        repeating-linear-gradient(0deg, transparent, transparent 49px, #ffffff04 49px, #ffffff04 50px),
        repeating-linear-gradient(90deg, transparent, transparent 49px, #ffffff03 49px, #ffffff03 50px);
      pointer-events: none; z-index: 0;
    }
  </style>
</head>
<body>

  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  <div id="toast-container"></div>

  <div style="position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 20px 40px;">
    <header style="padding: 28px 0 24px; display: flex; align-items: flex-end; justify-content: space-between;">
      <div>
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 4px;">
          <span id="live-indicator" style="font-family: 'Space Mono', monospace; font-size: 11px; color: #39ff6e; letter-spacing: '0.2em'; background: #39ff6e15; border: 1px solid #39ff6e44; padding: 2px 10px; border-radius: 4px; text-transform: uppercase; animation: neon-flicker 6s infinite;">● LIVE</span>
          <span id="realtime-clock" style="font-family: 'Space Mono', monospace; font-size: 11px; color: #3a3d5a; letter-spacing: 0.1em;">00:00:00</span>
        </div>
        <h1 style="font-family: 'Space Mono', monospace; font-size: clamp(24px, 4vw, 36px); font-weight: 700; letter-spacing: 0.04em; line-height: 1.1;">
          <span style="color: #39ff6e; text-shadow: 0 0 20px #39ff6e88;">밤샘</span><span style="color: #e0e8ff;"> 대피소</span>
        </h1>
        <p style="font-size: 12px; color: #3a4060; font-family: 'Space Mono', monospace; letter-spacing: 0.06em; margin-top: 4px;">
          MIDNIGHT SHELTER — 벼락치기 메이트
        </p>
      </div>
      <div style="text-align: right;">
        <div style="font-size: 11px; color: #3a3d5a; font-family: 'Space Mono', monospace; letter-spacing: 0.08em; margin-bottom: 4px;">ONLINE NOW</div>
        <div id="online-count" style="font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 700; color: #39ff6e; text-shadow: 0 0 16px #39ff6e;">5</div>
        <div style="font-size: 10px; color: #2a3050; font-family: 'Space Mono', monospace; letter-spacing: 0.1em;">명 생존 중</div>
      </div>
    </header>

    <div style="display: flex; gap: 4px; margin-bottom: 28px; background: #0a0e1e; border-radius: 12px; padding: 4px; border: 1px solid #1a1f3a;">
      <button class="nav-tab" onclick="switchTab(0)" style="flex: 1; padding: 11px 8px; background: #39ff6e18; border: 1px solid #39ff6e66; border-radius: 9px; color: #39ff6e; fontFamily: 'Space Mono', monospace; font-size: clamp(10px, 1.5vw, 13px); font-weight: 700; cursor: pointer; transition: all 0.25s; letter-spacing: 0.04em; box-shadow: 0 0 16px #39ff6e33;">
        <span style="margin-right: 6px;">👥</span>밤샘 메이트
      </button>
      <button class="nav-tab" onclick="switchTab(1)" style="flex: 1; padding: 11px 8px; background: transparent; border: 1px solid transparent; border-radius: 9px; color: #3a3d5a; fontFamily: 'Space Mono', monospace; font-size: clamp(10px, 1.5vw, 13px); font-weight: 400; cursor: pointer; transition: all 0.25s; letter-spacing: 0.04em;">
        <span style="margin-right: 6px;">⏱</span>집중 타이머
      </button>
      <button class="nav-tab" onclick="switchTab(2)" style="flex: 1; padding: 11px 8px; background: transparent; border: 1px solid transparent; border-radius: 9px; color: #3a3d5a; fontFamily: 'Space Mono', monospace; font-size: clamp(10px, 1.5vw, 13px); font-weight: 400; cursor: pointer; transition: all 0.25s; letter-spacing: 0.04em;">
        <span style="margin-right: 6px;">💬</span>대피소 톡방
      </button>
    </div>

    <div id="tab-content-0" class="tab-content" style="display: block;">
      <div style="margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between;">
        <span style="font-size: 11px; color: #3a3d5a; font-family: 'Space Mono', monospace; letter-spacing: 0.1em;">ACTIVE USERS — <span id="total-users-count">6</span>명</span>
        <span style="font-size: 11px; color: #39ff6e; font-family: 'Space Mono', monospace; background: #39ff6e12; border: 1px solid #39ff6e33; padding: 3px 10px; border-radius: 4px; letter-spacing: 0.08em;">
          <span style="animation: pulse-dot 1.5s infinite; display: inline-block;">●</span> 실시간 업데이트 중
        </span>
      </div>
      <div id="users-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px;">
        </div>
    </div>

    <div id="tab-content-1" class="tab-content" style="display: none;">
      <div style="background: linear-gradient(135deg, #0f1428, #0a0e1e); border: 1px solid #1e2240; border-radius: 16px; padding: 28px 32px; box-shadow: 0 0 40px #00000044;">
        <div style="display: flex; flex-direction: column; gap: 24px; height: 100%;">
          
          <div style="display: flex; gap: 8px; background: #0a0e1e; border-radius: 10px; padding: 4px;">
            <button id="mode-btn-stopwatch" onclick="setTimerMode(false)" style="flex: 1; padding: 8px 0; background: #bf5fff22; border: 1px solid #bf5fff88; border-radius: 8px; color: #bf5fff; font-family: 'Space Mono', monospace; font-size: 12px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; box-shadow: 0 0 12px #bf5fff33;">스톱워치</button>
            <button id="mode-btn-pomodoro" onclick="setTimerMode(true)" style="flex: 1; padding: 8px 0; background: transparent; border: 1px solid transparent; border-radius: 8px; color: #4a5070; font-family: 'Space Mono', monospace; font-size: 12px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em;">뽀모도로</button>
          </div>

          <div id="stopwatch-display-container" style="text-align: center; display: block;">
            <div id="stopwatch-time" style="font-family: 'Space Mono', monospace; font-size: clamp(52px, 10vw, 80px); font-weight: 700; color: #39ff6e; text-shadow: none; letter-spacing: 0.04em; line-height: 1; margin-bottom: 8px; transition: color 0.4s, text-shadow 0.4s;">00:00</div>
            <div style="font-size: 12px; color: #3a3d5a; font-family: 'Space Mono', monospace; letter-spacing: 0.1em; margin-bottom: 28px;">ELAPSED TIME</div>
            <div style="display: flex; gap: 12px; justify-content: center;">
              <button id="stopwatch-toggle-btn" onclick="toggleStopwatch()" style="background: #39ff6e18; border: 1.5px solid #39ff6e; border-radius: 50%; width: 64px; height: 64px; color: #39ff6e; font-size: 22px; cursor: pointer; box-shadow: 0 0 20px #39ff6e44; transition: all 0.2s;">▶</button>
              <button onclick="resetStopwatch()" style="background: transparent; border: 1.5px solid #2a2d4a; border-radius: 50%; width: 64px; height: 64px; color: #4a5070; font-size: 18px; cursor: pointer; transition: all 0.2s;">↺</button>
            </div>
          </div>

          <div id="pomodoro-display-container" style="text-align: center; display: none;">
            <div style="position: relative; display: inline-block; margin-bottom: 20px;">
              <svg width="160" height="160" style="transform: rotate(-90deg);">
                <circle cx="80" cy="80" r="70" fill="none" stroke="#1a1f3a" stroke-width="8"/>
                <circle id="pomodoro-progress-circle" cx="80" cy="80" r="70" fill="none" stroke="#bf5fff" stroke-width="8" stroke-dasharray="439.82" stroke-dashoffset="0" stroke-linecap="round" style="filter: drop-shadow(0 0 6px #bf5fff); transition: stroke-dashoffset 0.9s linear; animation: progress-pulse 2s infinite;"/>
              </svg>
              <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
                <div id="pomodoro-time" style="font-family: 'Space Mono', monospace; font-size: 30px; font-weight: 700; color: #bf5fff; text-shadow: 0 0 16px #bf5fff;">25:00</div>
                <div style="font-size: 10px; color: #4a5070; font-family: 'Space Mono', monospace; letter-spacing: 0.08em;">POMODORO</div>
              </div>
            </div>
            <div style="display: flex; gap: 12px; justify-content: center;">
              <button id="pomodoro-toggle-btn" onclick="togglePomodoro()" style="background: #bf5fff18; border: 1.5px solid #bf5fff; border-radius: 50%; width: 64px; height: 64px; color: #bf5fff; font-size: 22px; cursor: pointer; box-shadow: 0 0 20px #bf5fff44; transition: all 0.2s;">▶</button>
              <button onclick="resetPomodoro()" style="background: transparent; border: 1.5px solid #2a2d4a; border-radius: 50%; width: 64px; height: 64px; color: #4a5070; font-size: 18px; cursor: pointer; transition: all 0.2s;">↺</button>
            </div>
          </div>

          <div>
            <div style="font-size: 11px; color: #3a3d5a; font-family: 'Space Mono', monospace; letter-spacing: 0.1em; margin-bottom: 10px;">현재 상태 설정</div>
            <div id="status-options-container" style="display: flex; flex-direction: column; gap: 8px;">
              </div>
          </div>

          <div id="my-profile-preview-card" style="background: linear-gradient(135deg, #0f1428, #0a0e1e); border-radius: 12px; padding: 14px 16px;">
            </div>

        </div>
      </div>
    </div>

    <div id="tab-content-2" class="tab-content" style="display: none;">
      <div style="background: linear-gradient(135deg, #0f1428, #0a0e1e); border: 1px solid #1e2240; border-radius: 16px; padding: 24px; height: 560px; display: flex; flex-direction: column; box-shadow: 0 0 40px #00000044;">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #1a1f3a;">
          <div style="width: 10px; height: 10px; border-radius: 50%; background: #00e5ff; box-shadow: 0 0 8px #00e5ff; animation: pulse-dot 2s infinite;"></div>
          <span style="font-family: 'Space Mono', monospace; font-size: 12px; color: #00e5ff; letter-spacing: 0.1em;">새벽 대피소 익명 톡방</span>
          <span style="margin-left: auto; font-size: 11px; color: #3a3d5a; font-family: 'Space Mono', monospace;"><span id="chat-online-count">6</span>명 접속 중</span>
        </div>
        
        <div id="chat-messages-box" style="flex: 1; overflow-y: auto; padding-right: 4px; display: flex; flex-direction: column; gap: 12px;">
          </div>

        <div style="margin-top: 16px; display: flex; gap: 8px;">
          <div style="flex: 1; background: #0a0e1e; border: 1px solid #1e2240; border-radius: 10px; display: flex; align-items: center; padding-left: 12px; overflow: hidden;">
            <span style="color: #39ff6e; font-family: 'Space Mono', monospace; font-size: 13px; margin-right: 8px;">›</span>
            <input id="chat-input-field" type="text" placeholder="새벽의 외침을 남겨주세요..." style="flex: 1; background: transparent; border: none; outline: none; color: #c8d0e8; font-size: 13px; padding: 12px 0; font-family: 'Noto Sans KR', sans-serif;">
          </div>
          <button onclick="sendMessage()" style="background: #39ff6e18; border: 1.5px solid #39ff6e88; border-radius: 10px; padding: 0 20px; color: #39ff6e; font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; box-shadow: 0 0 14px #39ff6e33; letter-spacing: 0.05em;">전송</button>
        </div>
      </div>
    </div>

    <footer style="margin-top: 32px; text-align: center;">
      <div style="font-family: 'Space Mono', monospace; font-size: 10px; color: #1e2240; letter-spacing: 0.15em;">
        MIDNIGHT SHELTER v1.0 — 2026 컴퓨터개론 프로젝트
      </div>
    </footer>
  </div>

  <script>
    /* ==========================================================================
       DATA CONFIGURATION & GLOBAL STATE (상태 데이터 설정)
       ========================================================================== */
    const STATUS_CONFIG = {
      "💻 코딩 폭주": { color: "#39ff6e", glow: "0 0 12px #39ff6e88", tag: "🔥코딩 중" },
      "📚 개념 암기": { color: "#00e5ff", glow: "0 0 12px #00e5ff88", tag: "📖벼락치기 중" },
      "✍️ 레포트 작성": { color: "#bf5fff", glow: "0 0 12px #bf5fff88", tag: "📝레포트 잔혹사" },
      "💤 기절 직전": { color: "#555577", glow: "none", tag: "😴기절 직전" },
      "☕ 카페인 수혈":
